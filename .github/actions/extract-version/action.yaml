name: "Extract Version"
description: "Extracts the version from a specified file using yq."

inputs:
  file:
    description: "The file containing the version."
    required: true
    default: "package.json"        
  version_key:
    description: 'The key under which the version is stored (optional, defaults to ".version").'
    required: false
    default: ".version"
  prefix_with_v:
    description: 'Whether to prefix the version with "v" (true or false).'
    required: false
    default: "false" 

outputs:
  version:
    description: "The extracted version."
    value: ${{ steps.extract_version.outputs.version }}

runs:
  using: "composite"
  steps:

    - name: Extract Version
      id: extract_version
      shell: bash
      run: |
        FILE="${{ inputs.file }}"

        if [ ! -f "$FILE" ]; then
          echo "File not found: $FILE"
          exit 1
        fi

        # Determine file type
        case "$FILE" in
          *.toml) TOOL="toml" ;;
          *.json) TOOL="jq" ;;
          *.yaml|*.yml) TOOL="yq" ;;
          *) echo "Unsupported file type: $FILE"; exit 1 ;;
        esac

        # Install tool if not already installed
        case "$TOOL" in
          toml)
            if ! command -v toml &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y toml
            fi
            ;;
          jq)
            if ! command -v jq &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y jq
            fi
            ;;
          yq)
            if ! command -v yq &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y yq
            fi
            ;;
        esac

        # Extract version using detected tool
        case "$TOOL" in
          toml) VERSION=$(toml get "$FILE" package.version) ;;
          jq) VERSION=$(jq -r '.version' "$FILE") ;;
          yq) VERSION=$(yq e -r '.version' "$FILE") ;;
        esac

        if [ -z "$VERSION" ]; then
          echo "Version not found in $FILE."
          exit 1
        fi

        echo "VERSION=$VERSION" >> $GITHUB_ENV