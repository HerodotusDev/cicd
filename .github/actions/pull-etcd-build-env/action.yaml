name: 'Pull ETCD Build Env'
description: 'Fetch a .env file from ETCD and write it to /tmp so it survives a later checkout step.'

inputs:
  etcd_host:
    description: 'ETCD endpoint'
    required: false
    default: http://etcd.etcd.svc.cluster.local:2379
  etcd_user:
    description: 'ETCD username'
    required: true
  etcd_password:
    description: 'ETCD password'
    required: true
  etcd_root:
    description: 'ETCD root path'
    required: true
  app_name:
    description: 'Application name (etcd key segment)'
    required: true
  k8s_env:
    description: 'Kubernetes environment (stg / prod)'
    required: true
  namespace:
    description: 'Kubernetes namespace (used to resolve etcd host)'
    required: true

outputs:
  env_file:
    description: 'Absolute path to the written .env file (empty if not found)'
    value: ${{ steps.extract.outputs.path }}
  found:
    description: 'Whether the etcd key existed'
    value: ${{ steps.extract.outputs.found }}

runs:
  using: 'composite'
  steps:
    - name: Resolve ETCD host
      id: resolve
      shell: bash
      run: |
        if [ "${{ inputs.namespace }}" = "stg-daloc" ]; then
          echo "host=http://daloc-etcd.stg-daloc.svc.cluster.local:2379" >> "$GITHUB_OUTPUT"
          echo "docker_network=host" >> "$GITHUB_OUTPUT"
        else
          echo "host=${{ inputs.etcd_host }}" >> "$GITHUB_OUTPUT"
          echo "docker_network=bridge" >> "$GITHUB_OUTPUT"
        fi

    - name: Pull .env from ETCD
      id: pull
      continue-on-error: true
      shell: bash
      run: |
        set -e
        ETCD_KEY="/${{ inputs.etcd_root }}/${{ inputs.k8s_env }}/${{ inputs.app_name }}/.env"
        OUTPUT_DIR="${{ github.workspace }}/build-env-output"
        mkdir -p "${OUTPUT_DIR}"

        echo "Fetching etcd key: ${ETCD_KEY}"

        NETWORK_FLAG=""
        if [ "${{ steps.resolve.outputs.docker_network }}" = "host" ]; then
          NETWORK_FLAG="--network host"
        fi

        docker run --rm $NETWORK_FLAG \
          -e ETCD_HOST="${{ steps.resolve.outputs.host }}" \
          -e ETCD_USER="${{ inputs.etcd_user }}" \
          -e ETCD_PASSWORD="${{ inputs.etcd_password }}" \
          -e ETCD_KEY="${ETCD_KEY}" \
          -e APP_NAME="${{ inputs.app_name }}" \
          -e NAMESPACE="${{ inputs.namespace }}" \
          -v "${OUTPUT_DIR}:/output" \
          dataprocessor/etcd-pull:0.2 || true

        if [ -s "${OUTPUT_DIR}/secret.yaml" ]; then
          echo "no_key=false" >> "$GITHUB_OUTPUT"
          echo "output_dir=${OUTPUT_DIR}" >> "$GITHUB_OUTPUT"
        else
          echo "no_key=true" >> "$GITHUB_OUTPUT"
          echo "::warning::No .env found at etcd key ${ETCD_KEY}"
        fi

    - name: Extract raw .env from secret
      id: extract
      if: steps.pull.outputs.no_key == 'false'
      shell: bash
      run: |
        set -euo pipefail
        OUTPUT_DIR="${{ steps.pull.outputs.output_dir }}"
        OUT="/tmp/etcd-build-env"

        sudo chown -R "$(whoami):$(whoami)" "${OUTPUT_DIR}"

        # The secret.yaml has base64-encoded .env under data.".env"
        # Extract the base64 value and decode it
        ENV_B64=$(grep '\.env:' "${OUTPUT_DIR}/secret.yaml" | head -1 | awk '{print $2}')
        if [ -n "${ENV_B64}" ]; then
          echo "${ENV_B64}" | base64 -d > "${OUT}"
        fi

        if [ -s "${OUT}" ]; then
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "path=${OUT}" >> "$GITHUB_OUTPUT"
          echo "Wrote $(wc -l < "${OUT}") lines to ${OUT}"
        else
          echo "found=false" >> "$GITHUB_OUTPUT"
          echo "path=" >> "$GITHUB_OUTPUT"
          echo "::warning::Failed to decode .env from secret.yaml"
        fi

        rm -rf "${OUTPUT_DIR}"
